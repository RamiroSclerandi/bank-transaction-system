services:
  db:
    image: postgres:16
    container_name: bank_db
    command: ["postgres", "-c", "timezone=UTC"]
    environment:
      POSTGRES_DB: bank_transactions
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user -d bank_transactions"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      target: runtime
    container_name: bank_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://bank_user:bank_password@db:5432/bank_transactions
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: bank_frontend
  #   depends_on:
  #     - api
  #   ports:
  #     - "5173:5173"
  #   restart: unless-stopped

volumes:
  db_data:
